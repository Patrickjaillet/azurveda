name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg

jobs:
  changelog-check:
    name: CHANGELOG.md updated
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md was modified in this PR
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md was updated."
          else
            echo "::error::This PR does not update CHANGELOG.md. Every functional change must add an entry under [Unreleased] (see README.md)."
            exit 1
          fi

  build:
    name: Build (MSVC, x64) + run examples
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}
            !${{ env.VCPKG_ROOT }}/buildtrees
            !${{ env.VCPKG_ROOT }}/packages
            !${{ env.VCPKG_ROOT }}/downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Bootstrap vcpkg
        run: |
          if (-not (Test-Path "$env:VCPKG_ROOT/.git")) {
            git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
          }
          & "$env:VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics

      - name: Configure (CMake + vcpkg manifest)
        run: cmake --preset ci-windows-x64

      - name: Build (Release)
        run: cmake --build --preset ci-windows-x64-release

      - name: Run Example01_SimpleSerialization (console, no GPU/audio device required)
        run: |
          $exe = Get-ChildItem -Recurse -Filter "Example01_SimpleSerialization.exe" -Path out/build/ci-windows-x64 | Select-Object -First 1
          & $exe.FullName

      - name: Verify Example02/03 executables were produced
        run: |
          foreach ($name in @("Example02_SimpleMachineUse.exe", "Example03_SimpleMediaClass.exe")) {
            $exe = Get-ChildItem -Recurse -Filter $name -Path out/build/ci-windows-x64 | Select-Object -First 1
            if (-not $exe) { throw "$name was not built" }
          }
        # Example02/03 open an OpenGL/DirectSound device and are not executed here:
        # GitHub-hosted windows-latest runners have no GPU/audio device.

  version-bump:
    name: Auto-bump PATCH version on main
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump PATCH in VERSION
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r major minor patch <<< "$version"
          new_version="${major}.${minor}.$((patch + 1))"
          echo "$new_version" > VERSION
          echo "NEW_VERSION=$new_version" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "ci: bump version to ${NEW_VERSION} [skip ci]"
          git push
