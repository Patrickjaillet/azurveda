name: CI

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg

jobs:
  changelog-check:
    name: CHANGELOG.md updated
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md was modified in this PR
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md was updated."
          else
            echo "::error::This PR does not update CHANGELOG.md. Every functional change must add an entry under [Unreleased] (see README.md)."
            exit 1
          fi

      - name: Verify docs/screenshot.png was updated alongside VedaGUIWindowsMFC UI changes
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          if echo "$changed" | grep -qE '^VedaGUIWindowsMFC/.*\.rc2?$'; then
            if echo "$changed" | grep -qx 'docs/screenshot.png'; then
              echo "UI resource files changed and docs/screenshot.png was updated."
            else
              echo "::error::This PR changes VedaGUIWindowsMFC .rc/.rc2 resources but does not update docs/screenshot.png. Update the screenshot referenced from README.md (see roadmap.md Phase 6/7)."
              exit 1
            fi
          else
            echo "No VedaGUIWindowsMFC .rc/.rc2 changes in this PR; screenshot check skipped."
          fi

  build:
    name: Build (MSVC, x64, ${{ matrix.configuration }}) + run examples
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}
            !${{ env.VCPKG_ROOT }}/buildtrees
            !${{ env.VCPKG_ROOT }}/packages
            !${{ env.VCPKG_ROOT }}/downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Bootstrap vcpkg
        run: |
          if (-not (Test-Path "$env:VCPKG_ROOT/.git")) {
            git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
          }
          & "$env:VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics

      - name: Configure (CMake + vcpkg manifest)
        run: cmake --preset ci-windows-x64

      - name: Build (${{ matrix.configuration }})
        run: cmake --build --preset ci-windows-x64-${{ matrix.configuration == 'Debug' && 'debug' || 'release' }}

      - name: Run Example01_SimpleSerialization (console, no GPU/audio device required)
        run: |
          $exe = Get-ChildItem -Recurse -Filter "Example01_SimpleSerialization.exe" -Path out/build/ci-windows-x64 | Select-Object -First 1
          & $exe.FullName

      - name: Verify Example02/03 executables were produced
        run: |
          foreach ($name in @("Example02_SimpleMachineUse.exe", "Example03_SimpleMediaClass.exe")) {
            $exe = Get-ChildItem -Recurse -Filter $name -Path out/build/ci-windows-x64 | Select-Object -First 1
            if (-not $exe) { throw "$name was not built" }
          }
        # Example02/03 open an OpenGL/DirectSound device and are not executed here:
        # GitHub-hosted windows-latest runners have no GPU/audio device.

      - name: Upload Release build artifacts
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: azurveda-release-x64
          path: |
            out/build/ci-windows-x64/**/Release/Example*.exe
          retention-days: 7
          if-no-files-found: error

  version-bump:
    name: Auto-bump PATCH version on main
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump PATCH in VERSION
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r major minor patch <<< "$version"
          new_version="${major}.${minor}.$((patch + 1))"
          echo "$new_version" > VERSION
          echo "NEW_VERSION=$new_version" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "ci: bump version to ${NEW_VERSION} [skip ci]"
          git push

  release:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Release build artifacts
        uses: actions/download-artifact@v4
        with:
          name: azurveda-release-x64
          path: artifact-stage

      - name: Package release zip
        run: |
          $stage = Get-ChildItem -Recurse -Filter "Example*.exe" -Path artifact-stage
          if (-not $stage) { throw "No example executables found in downloaded artifact" }
          $zipDir = "azurveda-package"
          New-Item -ItemType Directory -Path $zipDir | Out-Null
          $stage | Copy-Item -Destination $zipDir
          Copy-Item docs/screenshot.png "$zipDir/screenshot.png"
          Copy-Item README.md, CHANGELOG.md, COPYING "$zipDir/"
          Compress-Archive -Path "$zipDir/*" -DestinationPath "AzurVeda-${{ github.ref_name }}-x64.zip"

      - name: Extract CHANGELOG section for this version
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $lines = Get-Content CHANGELOG.md
          $capture = $false
          $notes = New-Object System.Collections.Generic.List[string]
          foreach ($line in $lines) {
            if ($line -match '^## \[') {
              if ($capture) { break }
              if ($line -match [regex]::Escape("[$version]")) { $capture = $true }
              continue
            }
            if ($capture) { $notes.Add($line) }
          }
          if ($notes.Count -eq 0) {
            throw "No CHANGELOG.md section found for version $version. Rename the [Unreleased] section to [$version] - YYYY-MM-DD before tagging (see README.md)."
          }
          $screenshotUrl = "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docs/screenshot.png"
          @("![VedaGUIWindowsMFC editor]($screenshotUrl)", "") + $notes | Out-File -Encoding utf8 release_notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "AzurVeda-${{ github.ref_name }}-x64.zip" `
            --title "AzurVeda ${{ github.ref_name }}" `
            --notes-file release_notes.md
